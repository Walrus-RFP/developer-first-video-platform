services:
  # Control Plane (API & Database)
  - type: web
    name: walrus-control-plane
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn control_plane.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DATA_PLANE_URL
        value: https://walrus-data-plane.onrender.com

  # Data Plane (Decentralized HLS Streaming)
  - type: web
    name: walrus-data-plane
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn data_plane.stream_server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: AGGREGATOR_URL
        value: https://aggregator.walrus-testnet.walrus.space
      - key: PUBLISHER_URL
        value: https://publisher.walrus-testnet.walrus.space
      - key: CONTROL_PLANE_URL
        value: https://walrus-control-plane.onrender.com
