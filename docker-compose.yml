version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: walrus_user
      POSTGRES_PASSWORD: walrus_password
      POSTGRES_DB: walstream
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U walrus_user -d walstream"]
      interval: 5s
      timeout: 5s
      retries: 5

  control-plane:
    build: .
    command: uvicorn control_plane.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    dns:
      - 8.8.8.8
    environment:
      - DATABASE_URL=postgresql+psycopg2://walrus_user:walrus_password@db:5432/walstream
      - DATA_PLANE_URL=http://data-plane:8001
      - PUBLIC_DATA_PLANE_URL=${PUBLIC_DATA_PLANE_URL:-http://localhost:8001}
      - WALRUS_AGGREGATOR=${WALRUS_AGGREGATOR:-https://aggregator.walrus-testnet.walrus.space}
      - WALRUS_PUBLISHER=${WALRUS_PUBLISHER:-https://publisher.walrus-testnet.walrus.space}
      - SIGNING_SECRET=${SIGNING_SECRET:-change_me_in_production}
      - SUI_AUTH_PROXY_URL=http://sui-auth-proxy:8002
      - SUI_PACKAGE_ID=${SUI_PACKAGE_ID:-0x0}
      - SUI_REGISTRY_ID=${SUI_REGISTRY_ID:-0x0}
      - SUI_ACCESS_STORE_ID=${SUI_ACCESS_STORE_ID:-0x0}
      - WALRUS_HLS_EPOCHS=${WALRUS_HLS_EPOCHS:-50}
    depends_on:
      db:
        condition: service_healthy
      sui-auth-proxy:
        condition: service_started
    volumes:
      - ./storage:/app/storage

  data-plane:
    build: .
    command: uvicorn data_plane.stream_server:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql+psycopg2://walrus_user:walrus_password@db:5432/walstream
      - CONTROL_PLANE_URL=http://control-plane:8000
      - WALRUS_AGGREGATOR=${WALRUS_AGGREGATOR:-https://aggregator.walrus-testnet.walrus.space}
      - WALRUS_PUBLISHER=${WALRUS_PUBLISHER:-https://publisher.walrus-testnet.walrus.space}
      - SIGNING_SECRET=${SIGNING_SECRET:-change_me_in_production}
      - WALRUS_CHUNK_EPOCHS=${WALRUS_CHUNK_EPOCHS:-5}
      - WALRUS_HLS_EPOCHS=${WALRUS_HLS_EPOCHS:-50}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./storage:/app/storage

  sui-auth-proxy:
    build: ./sui-auth-proxy
    ports:
      - "8002:8002"
    environment:
      - SUI_PACKAGE_ID=${SUI_PACKAGE_ID:-}
      - SUI_REGISTRY_ID=${SUI_REGISTRY_ID:-}
      - SUI_ACCESS_STORE_ID=${SUI_ACCESS_STORE_ID:-}
      - SUI_NETWORK=${SUI_NETWORK:-testnet}
      - PORT=8002

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_CONTROL_PLANE_URL=${NEXT_PUBLIC_CONTROL_PLANE_URL:-http://localhost:8000}
      - NEXT_PUBLIC_DATA_PLANE_URL=${NEXT_PUBLIC_DATA_PLANE_URL:-http://localhost:8001}
      - NEXT_PUBLIC_SUI_PACKAGE_ID=${SUI_PACKAGE_ID:-0x0}
      - NEXT_PUBLIC_SUI_REGISTRY_ID=${SUI_REGISTRY_ID:-0x0}
      - NEXT_PUBLIC_SUI_ACCESS_STORE_ID=${SUI_ACCESS_STORE_ID:-0x0}
      - NEXT_PUBLIC_SUI_NETWORK=${SUI_NETWORK:-testnet}
    depends_on:
      - control-plane
      - data-plane

volumes:
  postgres_data:
